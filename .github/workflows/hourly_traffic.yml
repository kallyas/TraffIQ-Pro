name: Hourly Traffic Monitor

on:
  schedule:
    - cron: '0 * * * *'  # Runs exactly at the top of every hour, 24/7
  workflow_dispatch:      # Allows you to click a button and trigger it manually

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Create Credentials File
      run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials.json

    - name: Run Traffic Script
      env:
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        SPREADSHEET_NAME: ${{ secrets.SPREADSHEET_NAME }}
      run: python monitor.py
